name: Build/Generate Site With Mike

# Version = current calendar month (UTC) as YYYY.MM, e.g. 2026.07.
# Pushes overwrite that month's version and keep it as "latest".
# When the month rolls over, the next push creates the new YYYY.MM; the old one stays as history.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.6"

      - name: Resolve version (current YYYY.MM)
        id: version
        run: |
          set -euo pipefail
          ver="$(date -u +%Y.%m)"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Deploying / updating docs version **${ver}** (alias **latest**)" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Set AWS environment variables
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=us-west-1" >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: pip install -r docs/requirements.txt

      - name: Setup Docs Deploy
        run: |
          git config --global user.name "Docs Deploy"
          git config --global user.email "itzteajay@gmail.com"

      - name: Deploy with Mike
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mike deploy --push --update-aliases "$VERSION" latest

          tag="docs/${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            git tag -f "$tag"
            git push -f origin "$tag"
          else
            git tag "$tag"
            git push origin "$tag"
          fi

          echo "Deployed **${VERSION}** → **latest** (git tag \`${tag}\`)" >> "$GITHUB_STEP_SUMMARY"
